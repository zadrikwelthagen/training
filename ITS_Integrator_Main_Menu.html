<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ITS Integrator – Basic Technical Training</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root{--brand:#003366;--accent:#00B0F0;--accent2:#008cc1;--muted:#6c757d;--bg:#f4f6f8;}
body{font-family:Arial, sans-serif;background:var(--bg);margin:0}
header{background:var(--brand);color:#fff;padding:10px;text-align:center}
header h1{margin:0;font-size:18px}

.container{
  max-width:900px;
  margin:auto;
  min-height:calc(100vh - 60px);
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:10px;
  padding:12px;
}
.ui-scale{transform:scale(0.95);transform-origin:top center}

.card{
  background:#fff;
  border-radius:12px;
  padding:16px;
  border:2px solid var(--brand);
  box-shadow:0 2px 10px rgba(0,0,0,.06);
}
.hidden{display:none}

button{
  padding:12px 16px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:#fff;
  font-size:15px;
  cursor:pointer;
}
button:hover{background:var(--accent2)}
button:disabled{background:#a9cfe0;cursor:not-allowed}
.secondary{background:var(--muted)}

.row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;align-items:center}

.progressWrap{display:flex;align-items:center;gap:10px}
.progress{flex:1;height:12px;background:#dbe7f2;border-radius:999px;overflow:hidden}
.progress div{height:100%;background:var(--accent);width:0%}
.pct{font-weight:bold}
.hint{font-size:13px;color:#555;line-height:1.35}

#moduleGrid{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:12px}
#moduleGrid button{width:90%;max-width:520px}

#quizFrame{
  width:100%;
  height:40vh;
  min-height:500px;
  border-radius:10px;
  border:2px solid var(--brand);
}

input{
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
  min-width:260px;
}

/* ===== VIDEO PLAYER ===== */
.playerWrap{max-width:900px;margin:auto;margin-bottom:14px;}

#video{
  width:100%;
  max-height:70vh;
  height:auto;
  display:block;
  border-radius:10px;
  border:2px solid var(--brand);
  background:black;
  object-fit:contain;
}

.controlsBar{
  margin-top:10px;
  background:rgba(0,0,0,0.9);
  border-radius:10px;
  padding:10px;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:10px;
  color:#fff;
}

.controlsBar button{
  padding:8px 10px;
  border-radius:8px;
  font-size:14px;
}

.range{
  appearance:none;
  height:6px;
  border-radius:999px;
  background:#334155;
}

.range::-webkit-slider-thumb{
  appearance:none;
  width:14px;height:14px;
  border-radius:50%;
  background:var(--accent);
}

#seek{flex:1 1 260px;min-width:180px;}
.timeText{font-size:13px;min-width:110px;text-align:center}

/* Smaller Home button */
#player .row button.secondary{
  padding:6px 12px;
  font-size:13px;
  border-radius:6px;
}

/* ===== AUDIO GATE ===== */
#audioGate{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
#audioGate.hidden{display:none}
#audioGate .panel{
  background:#fff;
  border-radius:14px;
  padding:18px;
  text-align:center;
}
</style>

<!-- ✅ FIXED SCRIPT TAG -->
<script src="pdf-lib.min.js"
  onerror="this.onerror=null;this.src='https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js';">
</script>

<script>
const INTRO_AUDIO = 'Intro.mp3';

const modules = [
 {t:'General Infrastructure',v:'ITS Integrator Basic Training_General_Infra.mp4',q:'https://forms.gle/z8jLbgVMc1QTatjU9'},
 {t:'Linux Operating System',v:'ITS Integrator Basic Training_Linux.mp4',q:'https://forms.gle/EsjTCysDnbztkPNKA'},
 {t:'Oracle Database Management System',v:'ITS Integrator Basic Training_Oracle_DBMS.mp4',q:'https://forms.gle/AkqbDQtMTP21rLA96'},
 {t:'Oracle Application Fusion Middleware',v:'ITS Integrator Basic Training_Oracle_FMW.mp4',q:'https://forms.gle/781Z5PLQdUTj6fo57'},
 {t:'ITS Integrator Application',v:'ITS Integrator Basic Training_ITS.mp4',q:'https://forms.gle/iFp1gGGfFedsGcdR8'},
 {t:'Administration',v:'ITS Integrator Basic Training_Admin.mp4',q:'https://forms.gle/7xwPe7an3LPx4Ee99'}
];

let completed = Array(modules.length).fill(false);
let currentQuiz = null;
let introFinished = false;
let introStarted = false;

const $ = id => document.getElementById(id);

function show(view){
 ['menu','player','quiz'].forEach(v=>$(v).classList.add('hidden'));
 $(view).classList.remove('hidden');
}

function startIntroAudio(){
 if(introStarted) return;
 introStarted=true;
 const a=$('menuAudio');
 a.src=INTRO_AUDIO;
 a.play().catch(()=>{});
 a.onended=()=>{introFinished=true;$('audioGate').classList.add('hidden');update();}
}

function isUnlocked(i){
 if(!introFinished) return false;
 return i===0 || completed[i-1];
}

function loadModule(i){
 if(!isUnlocked(i)) return;
 show('player');
 $('title').innerText=modules[i].t;
 const v=$('video');
 v.src=modules[i].v;
 v.load();
 v.play().catch(()=>{});
 v.onended=()=>goQuiz(i);
}

function goQuiz(i){
 currentQuiz=i;
 show('quiz');
 $('quizFrame').src=modules[i].q;
 $('quizTitle').innerText=modules[i].t+' – Quiz';
}

function quizDone(){
 completed[currentQuiz]=true;
 show('menu');
 update();
}

function update(){
 const grid=$('moduleGrid');
 grid.innerHTML='';
 modules.forEach((m,i)=>{
  const b=document.createElement('button');
  b.textContent=m.t+(completed[i]?' ✓':'');
  b.disabled=!isUnlocked(i);
  b.onclick=()=>loadModule(i);
  grid.appendChild(b);
 });
}

window.addEventListener('load',()=>{
 show('menu');
 update();
 $('startBtn').onclick=startIntroAudio;
});
</script>
</head>

<body>

<audio id="menuAudio"></audio>

<div id="audioGate">
 <div class="panel">
  <h2>Start Training</h2>
  <p>Click Start</p>
  <button id="startBtn">▶ Start</button>
 </div>
</div>

<header><h1>ITS Integrator – Basic Technical Overview</h1></header>

<div class="container ui-scale">

<div id="menu" class="card">
 <h2 style="text-align:center">Main Menu</h2>
 <div id="moduleGrid"></div>
</div>

<div id="player" class="card hidden">
 <h2 id="title" style="text-align:center"></h2>
 <div class="playerWrap">
  <video id="video"></video>
  <div class="controlsBar">
   <button onclick="video.paused?video.play():video.pause()">▶/⏸</button>
   <input id="seek" class="range" type="range" min="0" max="0" />
   <div id="timeText" class="timeText"></div>
   <button onclick="video.muted=!video.muted" class="secondary">🔊</button>
   <button onclick="video.requestFullscreen()" class="secondary">⛶</button>
  </div>
 </div>
 <div class="row">
  <button class="secondary" onclick="show('menu')">🏠 Home</button>
 </div>
</div>

<div id="quiz" class="card hidden">
 <h2 id="quizTitle" style="text-align:center"></h2>
 <iframe id="quizFrame"></iframe>
 <div class="row">
  <button onclick="quizDone()">✅ Done</button>
  <button class="secondary" onclick="show('menu')">🏠 Home</button>
 </div>
</div>

</div>
</body>
</html>

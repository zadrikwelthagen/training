<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ITS Integrator – Basic Technical Training</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root{--brand:#003366;--accent:#00B0F0;--accent2:#008cc1;--muted:#6c757d;--bg:#f4f6f8;}
body{font-family:Arial, sans-serif;background:var(--bg);margin:0}
header{background:var(--brand);color:#fff;padding:10px;text-align:center}
header h1{margin:0;font-size:18px}
.container{
max-width:900px;
margin:auto;
min-height:calc(100vh - 60px);
display:flex;
flex-direction:column;
justify-content:center;
gap:10px;
padding:12px;
}
.ui-scale{transform:scale(0.95);transform-origin:top center}
.card{
background:#fff;
border-radius:12px;
padding:16px;
border:2px solid var(--brand);
box-shadow:0 2px 10px rgba(0,0,0,.06);
}
.hidden{display:none}
button{
padding:12px 16px;
border:none;
border-radius:8px;
background:var(--accent);
color:#fff;
font-size:15px;
cursor:pointer;
}
button:hover{background:var(--accent2)}
button:disabled{background:#a9cfe0;cursor:not-allowed}
.secondary{background:var(--muted)}
.row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;align-items:center}
.progressWrap{display:flex;align-items:center;gap:10px}
.progress{flex:1;height:12px;background:#dbe7f2;border-radius:999px;overflow:hidden}
.progress div{height:100%;background:var(--accent);width:0%}
.pct{font-weight:bold}
.hint{font-size:13px;color:#555;line-height:1.35}
#moduleGrid{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:12px}
#moduleGrid button{width:90%;max-width:520px}
video, iframe{
width:100%;
max-width:900px;
margin:auto;
display:block;
border-radius:10px;
border:2px solid var(--brand);
background:black;
}
#quizFrame{height:40vh;min-height:500px;max-width:900px;background:#fff}
input{padding:10px;border-radius:6px;border:1px solid #ccc;min-width:260px}

/* Audio gate */
#audioGate{
position:fixed;
inset:0;
background:rgba(0,0,0,0.60);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}
#audioGate.hidden{display:none;}
#audioGate .panel{
width:min(540px, 92vw);
background:#fff;
border:2px solid var(--brand);
border-radius:14px;
padding:18px;
text-align:center;
}
</style>

<script src="pdf-lib.min.js"
onerror="this.onerror=null;this.src='https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js';">
</script>

<script>
const INTRO_AUDIO = 'Intro.mp3';
const CERT_TEMPLATE_FILENAME = 'Certificate_Adapt_IT.pdf';
const STORAGE_KEY = 'its_integrator_training_progress_v2';

const modules = [
{t:'General Infrastructure',v:'ITS Integrator Basic Training_General_Infra.mp4',q:'https://forms.gle/z8jLbgVMc1QTatjU9'},
{t:'Linux Operating System',v:'ITS Integrator Basic Training_Linux.mp4',q:'https://forms.gle/EsjTCysDnbztkPNKA'},
{t:'Oracle Database Management System',v:'ITS Integrator Basic Training_Oracle_DBMS.mp4',q:'https://forms.gle/AkqbDQtMTP21rLA96'},
{t:'Oracle Application Fusion Middleware',v:'ITS Integrator Basic Training_Oracle_FMW.mp4',q:'https://forms.gle/781Z5PLQdUTj6fo57'},
{t:'ITS Integrator Application',v:'ITS Integrator Basic Training_ITS.mp4',q:'https://forms.gle/iFp1gGGfFedsGcdR8'},
{t:'Administration',v:'ITS Integrator Basic Training_Admin.mp4',q:'https://forms.gle/7xwPe7an3LPx4Ee99'}
];

let completed = Array(modules.length).fill(false);
let currentQuiz = null;
let introFinished = false;
let introStarted = false;

const $ = id => document.getElementById(id);

function getLearnerName(){
return ($('learnerName')?.value || '').trim();
}

function saveProgress(){
const data = { completed, introFinished, learnerName:getLearnerName() };
localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadProgress(){
const raw = localStorage.getItem(STORAGE_KEY);
if(!raw) return;
const data = JSON.parse(raw);
if(Array.isArray(data.completed)) completed = data.completed;
if(typeof data.introFinished === 'boolean') introFinished = data.introFinished;
if(typeof data.learnerName === 'string') $('learnerName').value = data.learnerName;
}

function show(view){
['menu','player','quiz','complete'].forEach(v=>$(v).classList.add('hidden'));
$(view).classList.remove('hidden');
$('progressCard').classList.toggle('hidden', view!=='menu');
}

function isUnlocked(i){
if(!introFinished) return false;
if(i===0) return true;
return completed[i-1];
}

function loadModule(i){
if(!isUnlocked(i)) return;
show('player');
$('title').innerText = modules[i].t;
const v = $('video');
v.src = modules[i].v;
v.play();
v.onended = ()=>goQuiz(i);
}

function goQuiz(i){
currentQuiz=i;
show('quiz');
$('quizFrame').src=modules[i].q;
$('quizTitle').innerText=modules[i].t+' – Quiz';
}

function quizDone(){
completed[currentQuiz]=true;
saveProgress();
if(completed.every(Boolean)) show('complete');
else { show('menu'); update(); }
}

function update(){
const done = completed.filter(Boolean).length;
$('progressFill').style.width = (done/modules.length*100)+'%';
$('progressPct').innerText = Math.round(done/modules.length*100)+'%';
$('progressText').innerText = `Progress: ${done} of ${modules.length} modules completed`;
const grid=$('moduleGrid'); grid.innerHTML='';
modules.forEach((m,i)=>{
const b=document.createElement('button');
b.textContent=m.t+(completed[i]?' ✓':'');
b.disabled=!isUnlocked(i);
b.onclick=()=>loadModule(i);
grid.appendChild(b);
});
}

window.addEventListener('load',()=>{
loadProgress();
show('menu');
update();
if(introFinished) $('audioGate').classList.add('hidden');
$('startBtn').onclick=()=>{
const a=$('menuAudio');
a.src=INTRO_AUDIO;
a.play();
a.onended=()=>{introFinished=true;saveProgress();$('audioGate').classList.add('hidden');update();}
};
});
</script>
</head>

<body>
<audio id="menuAudio"></audio>

<div id="audioGate">
<div class="panel">
<h2>Start Training</h2>
<p>Click Start</p>
<button id="startBtn">▶ Start</button>
</div>
</div>

<header><h1>ITS Integrator – Basic Technical Overview</h1></header>

<div class="container ui-scale">

<div id="progressCard" class="card">
<div class="progressWrap">
<div class="progress"><div id="progressFill"></div></div>
<div id="progressPct" class="pct">0%</div>
</div>
<div id="progressText" class="hint" style="text-align:center;margin-top:6px"></div>
</div>

<div id="menu" class="card">
<h2 style="text-align:center">Main Menu</h2>
<div id="moduleGrid"></div>
</div>

<div id="player" class="card hidden">
<h2 id="title" style="text-align:center"></h2>
<video id="video" controls></video>
<div class="row"><button class="secondary" onclick="show('menu')">🏠 Home</button></div>
</div>

<div id="quiz" class="card hidden">
<h2 id="quizTitle" style="text-align:center"></h2>
<iframe id="quizFrame"></iframe>
<div class="row">
<button onclick="quizDone()">✅ Done</button>
<button class="secondary" onclick="show('menu')">🏠 Home</button>
</div>
</div>

<div id="complete" class="card hidden">
<h2 style="text-align:center">Course Completed</h2>
<input id="learnerName" placeholder="Enter learner name" />
</div>

</div>
</body>
</html>
``
